version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: bitshare_postgres

    environment:
      POSTGRES_DB: bitshare
      POSTGRES_USER: bitshare
      POSTGRES_PASSWORD: bitshare

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: bitshare_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: